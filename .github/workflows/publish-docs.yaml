name: publish-docs

on:
  push:
    branches:
    - main
    paths:
    - docs/**

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ISSUE_ID: 83
  JAVA_VERSION: 25

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: temurin
        cache: maven

    - name: Cache ~/.m2/wrapper/dists
      uses: actions/cache@v5
      with:
        path: ~/.m2/wrapper/dists
        key: ${{ runner.os }}-maven-wrapper-${{ hashFiles('.mvn/wrapper/maven-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-maven-wrapper-

    - name: mvn install -DskipTests -Dquarkus.build.skip
      run: ./mvnw clean install -DskipTests -Dquarkus.build.skip -e -B -ntp

    - name: Fail on uncommitted changes
      run: |
        [[ -z $(git status --porcelain) ]] || {
          echo 'There are uncommitted changes'
          git status
          git diff
          exit 1
        }

    - name: Build Antora site
      run: cd docs && ../mvnw clean package -e -B -ntp

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/target/classes/META-INF/antora

    - name: Report failure in issue {{ env.ISSUE_ID }}
      if: ${{ failure() }}
      uses: actions/github-script@v7
      with:
        script: |
          const issue = await github.rest.issues.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: env.ISSUE_ID
          });
          if (issue.data.state !== 'open') {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: env.ISSUE_ID,
              state: 'open'
            });
          }
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: env.ISSUE_ID,
            body: `Documentation build failed for ${sha}:\n\n${JSON.stringify(context.payload?.workflow_run?.conclusion || 'see logs')}\nWorkflow run: ${runUrl}`
          });

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Close issue {{ env.ISSUE_ID }} on success
      uses: actions/github-script@v7
      with:
        script: |
          const issue = await github.rest.issues.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: env.ISSUE_ID
          });
          if (issue.data.state === 'open') {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: env.ISSUE_ID,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: env.ISSUE_ID,
              body: `Documentation published successfully for ${sha} `
            });
          }

    - name: Report failure in issue {{ env.ISSUE_ID }}
      if: ${{ failure() }}
      uses: actions/github-script@v7
      with:
        script: |-
          const issue = await github.rest.issues.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: env.ISSUE_ID
          });
          if (issue.data.state !== 'open') {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: env.ISSUE_ID,
              state: 'open'
            });
          }
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: env.ISSUE_ID,
            body: `Documentation publication failed for ${sha}:\n\n${JSON.stringify(context.payload?.workflow_run?.conclusion || 'see logs')}\nWorkflow run: ${runUrl}`
          });